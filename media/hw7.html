<html>
  <head>
    <title>示範事件處理程式</title>
    <script language="javascript">
      function Button_Click() {
        window.alert('雙擊按鈕成功!!');
      }
    </script>
  </head>
  <body>
    <input
      type="BUTTON"
      id="b1"
      value="雙擊按鈕"
      ondblclick="javascript:Button_Click();"
    />
  </body>
</html>
