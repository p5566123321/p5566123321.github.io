<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
    function tree(){
      var num = prompt("輸入n:","")
        
      var txt="";
      
      for(var i=1;i<=num;i++)
      {
        for(var j=0;j<num-i;j++)
            txt=txt+" ";
        for(var k=1;k<=2*i-1;k++)
            txt=txt+"*";
        txt=txt+"\n";

      }
      for(var i=0;i<num;i++)
      {
        for(var j=0;j<num-1;j++)
            txt=txt+" ";
        txt=txt+"*"+"\n";
      }
     alert(txt);
    }

    tree();
    </script>

</head>
<body>

</body>
</html>
