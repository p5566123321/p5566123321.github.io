<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
      rel="stylesheet"
    />
    
    <script src="http://code.jquery.com/jquery-2.1.4.min.js"></script>
    <script src="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
  </head>

  <body>
    <!-- 相片輪播元件 -->
    <div
      id="photoCarousel"
      class="carousel slide vertical"
      data-ride="carousel"
    >
      <!--建立輪播元件.立即啟用功能-->
      <!-- Indicators 瀏覽控制 -->
      <ol class="carousel-indicators" style="margin-top: 10px">
        <!--顯示目前觀看的圓圈-->
        <li data-target="#photoCarousel" data-slide-to="0" class="active"></li>
        <!--第一個圓-->
        <li data-target="#photoCarousel" data-slide-to="1"></li>
        <li data-target="#photoCarousel" data-slide-to="2"></li>
      </ol>

      <!-- 建立相片清單 -->
      <div class="carousel-inner">
        <div class="item active">
          <img  src="media/carousel_pic1.jpg" />
        </div>
        <div class="item">
          <img  src="media/carousel_pic2.jpg" />
        </div>
        <div class="item">
          <img src="media/carousel_pic3.jpg" />
        </div>
      </div>
      <!-- 上一張/下一張控制 -->
      <a class="left carousel-control" href="#photoCarousel" data-slide="prev">
        <span class="glyphicon glyphicon-chevron-left"></span></a
      ><!--切到前一張-->
      <a class="right carousel-control" href="#photoCarousel" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right"></span></a
      ><!--切到後一張-->
    </div>
    <nav class="navbar navbar-default">
      <ul class="nav nav-pills">
        <li role="presentation" ><a href="media/hw2.html">HW2</a></li>
        <li role="presentation"><a href="media/hw3.html">HW3</a></li>
        <li role="presentation"><a href="media/hw4.html">HW4</a></li>
        <li role="presentation"><a href="media/hw7.html">HW7</a></li>
        <li role="presentation"><a href="media/hw8.html">HW8</a></li>
      </ul>
    </div>
  </nav>
  </body>
</html>
